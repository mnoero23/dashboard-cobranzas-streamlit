name: Update simulated dataset

on:
  workflow_dispatch:
  schedule:
    - cron: "20 8 * * *"

permissions:
  contents: write

jobs:
  update-dataset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update simulated Excel dataset
        run: python scripts/update_dataset.py

      - name: Commit dataset changes
        run: |
          if git diff --quiet -- data/dataset_cobranzas.xlsx data/update_log.csv; then
            echo "No dataset changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dataset_cobranzas.xlsx data/update_log.csv
          git commit -m "Actualiza dataset simulado"
          git push
